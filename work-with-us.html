<main class="main-contacto">
    <section class="hero-contacto degradado-final">
        <h1 class="titulo-grande">WORK WITH US</h1>
        <p class="subtitulo">Join the line of the Pegasso team</p>
    </section>

    <div class="contenedor-contacto-grid">
        <section class="formulario-solicitud">
            <h2>Application Form</h2>
            <form action="#" method="POST" class="form-standard">
                
                <fieldset class="bloque-formulario">
                    <legend>Personal Details</legend>
                    <div class="grid-form">
                        <div class="grupo-input"><label>Name</label><input type="text" name="nombre" required></div>
                        <div class="grupo-input"><label>Last Name</label><input type="text" name="apellidos" required></div>
                        <div class="grupo-input"><label>ID / Passport</label><input type="text" name="dni" required pattern="[0-9]{8}[A-Z]"></div>
                        <div class="grupo-input">
                            <label>Gender</label>
                            <select name="sexo">
                                <option value="H">Male</option>
                                <option value="M">Female</option>
                                <option value="O">Other</option>
                            </select>
                        </div>
                        <div class="grupo-input"><label>Date of Birth</label><input type="date" name="fecha_nac" required></div>
                        <div class="grupo-input"><label>City</label><input type="text" name="ciudad" required></div>
                        <div class="grupo-input"><label>Nationality</label><input type="text" name="nacionalidad" required></div>
                        <div class="grupo-input"><label>Zip Code</label><input type="number" name="cp" required></div>
                        <div class="grupo-input"><label>Phone</label><input type="tel" name="tel" required></div>
                        <div class="grupo-input"><label>Email</label><input type="email" name="email" required></div>
                    </div>
                </fieldset>

                <fieldset class="bloque-formulario" style="margin-top: 20px;">
                    <legend>Education</legend>
                    <div class="grupo-input">
                        <label>Degree / Qualification</label>
                        <input type="text" name="titulacion" placeholder="Ex: Web Development Technician">
                    </div>
                    <div class="grid-form">
                        <div class="grupo-input"><label>Start Year</label><input type="number" name="año_ini" min="1950" max="2026" placeholder="YYYY"></div>
                        <div class="grupo-input"><label>End Year</label><input type="number" name="año_fin" min="1950" max="2026" placeholder="YYYY"></div>
                    </div>
                </fieldset>

                <fieldset class="bloque-formulario" style="margin-top: 20px;">
                    <legend>Languages</legend>
                    <div class="grupo-input" style="margin-bottom: 15px;">
                        <label>Language</label>
                        <input type="text" name="idioma_nombre" placeholder="Ex: English">
                    </div>
                    <div class="grid-idiomas">
                        <div class="grupo-input">
                            <label>Spoken</label>
                            <select name="hablado">
                                <option value="E">Excellent</option><option value="G">Good</option><option value="F">Fair</option><option value="N">None</option> </select>
                        </div>
                        <div class="grupo-input">
                            <label>Reading</label>
                            <select name="leido">
                                <option value="E">Excellent</option><option value="G">Good</option><option value="F">Fair</option><option value="N">None</option>
                            </select>
                        </div>
                        <div class="grupo-input">
                            <label>Writing</label>
                            <select name="escrito">
                                <option value="E">Excellent</option><option value="G">Good</option><option value="F">Fair</option><option value="N">None</option>
                            </select>
                        </div>
                    </div>
                </fieldset>

                <button type="submit" class="boton-dorado">SUBMIT APPLICATION</button>
            </form>
        </section>
    </div>
</main>
